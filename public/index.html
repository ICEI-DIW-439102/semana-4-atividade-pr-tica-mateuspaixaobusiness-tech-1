<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Psyche Music</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Fax.on</h1>
  <nav class="menu">
    <a href="#">Home</a>
    <a href="#">Artistas</a>
    <a href="#">Contato</a>
  </nav>
</header>

<main>

  <section class="hero">
    <img src="https://picsum.photos/800/300" alt="banner">
    <h2>Descubra novos artistas</h2>
  </section>

  <section class="artistas">
    <article class="card">
      <img src="https://picsum.photos/200/200" alt="">
      <h3>Artista 1</h3>
    </article>

    <article class="card">
      <img src="https://picsum.photos/200/200" alt="">
      <h3>Artista 2</h3>
    </article>
  </section>

  <section class="formulario">
    <h2>Inscreva-se</h2>
    <form>
      <input type="text" placeholder="Nome">
      <input type="email" placeholder="Email">
      <button>Enviar</button>
    </form>
  </section>

</main>

<footer class="footer">
  <p>© 2026 Fax.on</p>
</footer>

</body>
</html>
